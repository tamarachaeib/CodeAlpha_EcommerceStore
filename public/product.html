<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product - ShopZone</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .slideshow {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: #f8f9ff;
    }
    .slideshow-images {
      display: flex;
      transition: transform 0.4s ease;
    }
    .slideshow-images img {
      min-width: 100%;
      height: 420px;
      object-fit: cover;
    }
    .slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      transition: all 0.3s;
      z-index: 10;
    }
    .slide-btn:hover { background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .slide-prev { left: 12px; }
    .slide-next { right: 12px; }
    .slide-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }
    .slide-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    .slide-dot.active {
      background: var(--primary);
      width: 24px;
      border-radius: 4px;
    }
    .related-section {
      max-width: 1000px;
      margin: 0 auto 80px;
      padding: 0 30px;
    }
    .related-section h2 {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark2);
      margin-bottom: 25px;
      letter-spacing: -0.5px;
    }
    .sold-out-badge {
      display: inline-block;
      background: rgba(255,101,132,0.1);
      color: var(--secondary);
      border: 1px solid rgba(255,101,132,0.3);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
    .in-stock-badge {
      display: inline-block;
      background: rgba(67,233,123,0.1);
      color: #1a7a3e;
      border: 1px solid rgba(67,233,123,0.3);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🛍️ ShopZone</div>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/products.html">Products</a>
      <div class="nav-dropdown">
        <a href="#" class="dropdown-toggle">Categories <i class="fas fa-chevron-down"></i></a>
        <div class="dropdown-menu" id="nav-categories"></div>
      </div>
      <a href="/cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count">0</span></a>
      <a href="/orders.html" id="nav-orders" style="display:none">My Orders</a>
      <a href="/admin.html" id="nav-admin" style="display:none">⚙️ Admin</a>
      <a href="/login.html" id="nav-login">Login</a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
      <span id="nav-username" style="color:#fff;margin-left:10px"></span>
    </div>
  </nav>

  <div id="product-detail"></div>

  <div class="related-section">
    <div id="related-products"></div>
  </div>

  <footer>
    <p>© 2025 ShopZone. All rights reserved.</p>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/index.js"></script>
  <script>
    let currentSlide = 0;
    let productImages = [];
    let selectedSize = null;
    let selectedColor = null;

    function selectSize(btn) {
      document.querySelectorAll('[data-size]').forEach(b => {
        b.style.borderColor = 'var(--border)';
        b.style.background = '#fff';
        b.style.color = 'var(--text)';
      });
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = 'var(--primary)';
      btn.style.color = '#fff';
      selectedSize = btn.dataset.size;
    }

    function selectColor(btn) {
      document.querySelectorAll('[data-color]').forEach(b => {
        b.style.borderColor = 'var(--border)';
        b.style.background = '#fff';
        b.style.color = 'var(--text)';
      });
      btn.style.borderColor = 'var(--primary)';
      btn.style.background = 'var(--primary)';
      btn.style.color = '#fff';
      selectedColor = btn.dataset.color;
    }

    function addToCartWithOptions(product) {
      const hasSizes = product.sizes && product.sizes.length > 0;
      const hasColors = product.colors && product.colors.length > 0;

      if (hasSizes && !selectedSize) {
        showAlert('Please select a size', 'error');
        return;
      }
      if (hasColors && !selectedColor) {
        showAlert('Please select a color', 'error');
        return;
      }

      const cartProduct = {
        ...product,
        selectedSize: selectedSize || null,
        selectedColor: selectedColor || null,
        _id: product._id + (selectedSize || '') + (selectedColor || '')
      };

      addToCart(cartProduct);
    }

    function initSlideshow(images) {
      productImages = images;
      const container = document.getElementById('slideshow-images');
      const dots = document.getElementById('slide-dots');
      if (!container) return;

      container.innerHTML = images.map(img => `
        <img src="${img}" onerror="this.src='https://via.placeholder.com/500x420?text=No+Image'"/>
      `).join('');

      dots.innerHTML = images.map((_, i) => `
        <button class="slide-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></button>
      `).join('');

      if (images.length <= 1) {
        document.querySelector('.slide-prev').style.display = 'none';
        document.querySelector('.slide-next').style.display = 'none';
        dots.style.display = 'none';
      }
    }

    function goToSlide(index) {
      currentSlide = index;
      const container = document.getElementById('slideshow-images');
      if (container) container.style.transform = `translateX(-${index * 100}%)`;
      document.querySelectorAll('.slide-dot').forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });
    }

    function nextSlide() {
      goToSlide((currentSlide + 1) % productImages.length);
    }

    function prevSlide() {
      goToSlide((currentSlide - 1 + productImages.length) % productImages.length);
    }

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = '/products.html'; return; }

      const container = document.getElementById('product-detail');
      container.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const product = await apiCall(`/api/products/${id}`);
        if (product.message) {
          container.innerHTML = '<div class="empty"><p>Product not found</p></div>';
          return;
        }

        document.title = `${product.name} - ShopZone`;

        const images = product.images && product.images.length > 0
          ? product.images
          : [product.image];

        const isSoldOut = product.stock === 0;
        const productJson = JSON.stringify(product).replace(/"/g, '&quot;');

        container.innerHTML = `
          <div class="product-detail">
            <div>
              <div class="slideshow">
                <button class="slide-btn slide-prev" onclick="prevSlide()">&#8249;</button>
                <div class="slideshow-images" id="slideshow-images"></div>
                <button class="slide-btn slide-next" onclick="nextSlide()">&#8250;</button>
              </div>
              <div class="slide-dots" id="slide-dots"></div>
            </div>
            <div class="product-detail-info">
              <span class="category">${product.category}</span>
              ${isSoldOut
                ? '<div class="sold-out-badge">🚫 Sold Out</div>'
                : `<div class="in-stock-badge">✅ In Stock (${product.stock} left)</div>`
              }
              <h1>${product.name}</h1>
              <div class="price">$${product.price.toFixed(2)}</div>
              <p>${product.description}</p>

              ${product.sizes && product.sizes.length > 0 ? `
                <div style="margin-bottom:20px;">
                  <div style="font-size:13px; font-weight:700; color:var(--dark2); margin-bottom:10px;">SIZE</div>
                  <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    ${product.sizes.map(s => `
                      <button onclick="selectSize(this)" data-size="${s}"
                        style="padding:8px 16px; border:2px solid var(--border); background:#fff;
                        border-radius:8px; cursor:pointer; font-size:13px; font-weight:600;
                        font-family:'Poppins',sans-serif; transition:all 0.2s;">
                        ${s}
                      </button>
                    `).join('')}
                  </div>
                </div>
              ` : ''}

              ${product.colors && product.colors.length > 0 ? `
                <div style="margin-bottom:20px;">
                  <div style="font-size:13px; font-weight:700; color:var(--dark2); margin-bottom:10px;">COLOR</div>
                  <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    ${product.colors.map(c => `
                      <button onclick="selectColor(this)" data-color="${c}"
                        style="padding:8px 16px; border:2px solid var(--border); background:#fff;
                        border-radius:8px; cursor:pointer; font-size:13px; font-weight:600;
                        font-family:'Poppins',sans-serif; transition:all 0.2s;">
                        ${c}
                      </button>
                    `).join('')}
                  </div>
                </div>
              ` : ''}

              ${isSoldOut
                ? `<button class="btn-primary" disabled style="opacity:0.5; cursor:not-allowed; width:100%">
                    🚫 Out of Stock
                   </button>`
                : `<button class="btn-primary" style="width:100%" onclick="addToCartWithOptions(${productJson})">
                    <i class="fas fa-shopping-cart"></i> Add to Cart
                   </button>`
              }
              <br/><br/>
              <a href="/products.html" style="color:var(--primary); font-weight:600">← Back to Products</a>
            </div>
          </div>
        `;

        initSlideshow(images);
        loadRelatedProducts(product.category, product._id);

      } catch (error) {
        container.innerHTML = '<div class="empty"><p>Error loading product</p></div>';
      }
    }

    async function loadRelatedProducts(category, currentId) {
      const container = document.getElementById('related-products');
      try {
        const products = await apiCall(`/api/products?category=${encodeURIComponent(category)}`);
        const related = products.filter(p => p._id !== currentId).slice(0, 4);
        if (!related.length) return;
        container.innerHTML = `
          <h2>Related Products</h2>
          <div class="products-grid">
            ${related.map(p => renderProductCard(p)).join('')}
          </div>
        `;
      } catch (error) {
        console.log('Error loading related products');
      }
    }

    loadProduct();
  </script>
</body>
</html>
